user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Dynamic Serving Engine for Deployments
    server {
        listen       80;
        server_name  ~^(?<proj_id>[^--]+)--(?<dep_id>[^.]+)\.localhost$;

        # Resolver for Docker internal DNS
        resolver 127.0.0.11 valid=30s;

        location / {
            # 1. Enable interception for 404s (for SPA routing)
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;

            # 2. Resolve index.html for root requests
            rewrite ^/$ /index.html break;

            # 3. Proxy to MinIO
            # Pattern: bucket/projects/PROJ_ID/deployments/DEP_ID/artifacts/URI
            proxy_pass http://forge-minio:9000/forge-deploy-assets/projects/$proj_id/deployments/$dep_id/artifacts$uri;

            proxy_set_header Host forge-minio;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;
            
            include /etc/nginx/mime.types;
        }

        # Fallback for Single Page Applications (React/Vue/etc)
        location @spa_fallback {
            proxy_pass http://forge-minio:9000/forge-deploy-assets/projects/$proj_id/deployments/$dep_id/artifacts/index.html;
            proxy_set_header Host forge-minio;
            include /etc/nginx/mime.types;
        }
    }

    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }

        # Proxy for MinIO API
        location /s3/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;

            proxy_pass http://forge-minio:9000/;
        }

        # Proxy for MinIO Console
        location /minio/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy true;

            proxy_connect_timeout 300;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;

            proxy_pass http://forge-minio:9001/;
        }
    }
}
