services:
  forgedeploy-db:
    image: postgres:latest
    container_name: forgedeploy-db
    environment:
      POSTGRES_DB: forge-deploy-service
      POSTGRES_USER: forge_user
      POSTGRES_PASSWORD: forge_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge_user -d forge-deploy-service"]
      interval: 10s
      timeout: 5s
      retries: 5

  forge-minio:
    image: minio/minio:latest
    container_name: forge-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  forgedeploy-nginx:
    image: nginx:alpine
    container_name: forgedeploy-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      forgedeploy-db:
        condition: service_healthy
      forge-minio:
        condition: service_healthy

