spring:
  application:
    name: service

  datasource:
    url: jdbc:postgresql://localhost:5432/forge-deploy-service
    username: forge_user
    password: forge_password

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: 048e51adcecaef206bdb0b11a8af5f7baef79cbf580dcf3030b8bbf33aa091b4

storage:
  s3:
    bucket-name: forge-deploy-assets
    endpoint: http://localhost:9000
    access-key: admin
    secret-key: password
    region: us-east-1
